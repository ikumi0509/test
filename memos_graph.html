<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Learning Memo Graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
    .header { padding: 16px 24px; background: #16213e; display: flex; align-items: center; gap: 24px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .legend { display: flex; gap: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    #graph { width: 100%; height: 65vh; }
    #detail { padding: 24px; min-height: 20vh; background: #16213e; }
    #detail .placeholder { color: #888; }
    #detail h2 { font-size: 18px; margin-bottom: 8px; }
    #detail .meta { color: #aaa; font-size: 13px; margin-bottom: 12px; }
    #detail .tags span { background: #0f3460; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 6px; }
    #detail .content { margin-top: 12px; white-space: pre-wrap; line-height: 1.6; }
    .stats { margin-left: auto; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Learning Memo Graph</h1>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#4A90D9"></span> Learned</div>
      <div class="legend-item"><span class="legend-dot" style="background:#27AE60"></span> Todo</div>
      <div class="legend-item"><span class="legend-dot" style="background:#E67E22"></span> Reflection</div>
    </div>
    <div class="stats">5 memos | 3 connections</div>
  </div>
  <div id="graph"></div>
  <div id="detail">
    <p class="placeholder">Click a node to see its content.</p>
  </div>

  <script>
    var memoData = [{"id": "267b2ecc", "title": "GitHub Actionsを学んだ", "content": "CI/CDの基本。push/PR時に自動でpytestを実行する仕組み。無料枠は月2000分（Linux）。", "type": "learned", "tags": ["github", "actions", "ci-cd"], "date": "2026-04-09"}, {"id": "412dfd4c", "title": "GitHub Secretsを学んだ", "content": "APIキーなどの機密情報をSecretsで安全に管理できる。暗号化保存、ログマスク、Fork制限あり。", "type": "learned", "tags": ["github", "security", "secrets"], "date": "2026-04-09"}, {"id": "32a792a2", "title": "ネットワークグラフ可視化を実装したい", "content": "vis.jsを使ってメモ同士の関係を可視化する。タグ共有でエッジを張る。", "type": "todo", "tags": ["visualization", "javascript", "vis-js"], "date": "2026-04-09"}, {"id": "1b266145", "title": "今日の振り返り", "content": "GitHub Actions、Secrets、テスト駆動開発など多くのことを学べた。可視化も面白い。", "type": "reflection", "tags": ["daily", "github", "python"], "date": "2026-04-09"}, {"id": "c0c61056", "title": "Claude Codeがアプリで使えること", "content": "Claude CodeはCLIだけでなく、デスクトップアプリ（Mac/Windows）、Webアプリ（claude.ai/code）、IDE拡張（VS Code、JetBrains）など様々な形で利用できる。", "type": "learned", "tags": ["claude-code", "app", "tools"], "date": "2026-04-09"}];
    var nodes = new vis.DataSet([{"id": "267b2ecc", "label": "GitHub Actionsを学んだ\n#github #actions #ci-cd", "color": {"background": "#4A90D9", "border": "#4A90D9"}, "title": "CI/CDの基本。push/PR時に自動でpytestを実行する仕組み。無料枠は月2000分（Linux）。"}, {"id": "412dfd4c", "label": "GitHub Secretsを学んだ\n#github #security #secrets", "color": {"background": "#4A90D9", "border": "#4A90D9"}, "title": "APIキーなどの機密情報をSecretsで安全に管理できる。暗号化保存、ログマスク、Fork制限あり。"}, {"id": "32a792a2", "label": "ネットワークグラフ可視化を実装したい\n#visualization #javascript #vis-js", "color": {"background": "#27AE60", "border": "#27AE60"}, "title": "vis.jsを使ってメモ同士の関係を可視化する。タグ共有でエッジを張る。"}, {"id": "1b266145", "label": "今日の振り返り\n#daily #github #python", "color": {"background": "#E67E22", "border": "#E67E22"}, "title": "GitHub Actions、Secrets、テスト駆動開発など多くのことを学べた。可視化も面白い。"}, {"id": "c0c61056", "label": "Claude Codeがアプリで使えること\n#claude-code #app #tools", "color": {"background": "#4A90D9", "border": "#4A90D9"}, "title": "Claude CodeはCLIだけでなく、デスクトップアプリ（Mac/Windows）、Webアプリ（claude.ai/code）、IDE拡張（VS Code、JetBrains）など様々な形で利用"}]);
    var edges = new vis.DataSet([{"from": "267b2ecc", "to": "412dfd4c", "label": "github"}, {"from": "1b266145", "to": "267b2ecc", "label": "github"}, {"from": "1b266145", "to": "412dfd4c", "label": "github"}]);

    var container = document.getElementById("graph");
    var data = { nodes: nodes, edges: edges };
    var options = {
      nodes: {
        shape: "dot",
        size: 18,
        font: { size: 12, color: "#eee" },
        borderWidth: 2
      },
      edges: {
        font: { size: 9, align: "middle", color: "#888" },
        color: { color: "#444", highlight: "#888" },
        smooth: { type: "continuous" }
      },
      physics: {
        solver: "forceAtlas2Based",
        forceAtlas2Based: { gravitationalConstant: -40, springLength: 120 }
      },
      interaction: { hover: true }
    };

    var network = new vis.Network(container, data, options);

    network.on("click", function(params) {
      var detail = document.getElementById("detail");
      if (params.nodes.length > 0) {
        var id = params.nodes[0];
        var memo = memoData.find(function(m) { return m.id === id; });
        if (memo) {
          var tagsHtml = memo.tags.map(function(t) { return "<span>#" + t + "</span>"; }).join("");
          detail.innerHTML =
            "<h2>" + memo.title + "</h2>" +
            '<div class="meta">' + memo.type + ' | ' + memo.date + '</div>' +
            '<div class="tags">' + tagsHtml + '</div>' +
            '<div class="content">' + memo.content + '</div>';
        }
      } else {
        detail.innerHTML = '<p class="placeholder">Click a node to see its content.</p>';
      }
    });
  </script>
</body>
</html>
